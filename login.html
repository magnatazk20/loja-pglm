<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — PGLM Gift Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-bg" aria-hidden="true">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>

  <div class="auth-wrap">

    <a href="index.html" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Voltar para a loja
    </a>

    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-badge">PG</span>
        <span class="logo-text">PGLM</span>
      </div>

      <h1 class="auth-title">Bem-vindo de volta</h1>
      <p class="auth-sub">Entre na sua conta para ver seus gift cards.</p>

      <div id="auth-feedback" class="auth-feedback" style="display:none"></div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="auth-field">
          <label for="login-email">E-mail</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2z" stroke="currentColor" stroke-width="2"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2"/></svg>
            <input type="email" id="login-email" name="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="login-password">
            Senha
            <a href="#" class="auth-forgot">Esqueci a senha</a>
          </label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pass" data-target="login-password" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="auth-btn-text">Entrar na conta</span>
          <span class="auth-spinner" style="display:none"></span>
        </button>
      </form>

      <p class="auth-switch">
        Não tem conta? <a href="cadastro.html">Criar conta grátis</a>
      </p>
    </div>

  </div>

  <script src="auth.js"></script>
</body>
</html>
