<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — PGLM Gift Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-bg" aria-hidden="true">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>

  <div class="auth-wrap">

    <a href="index.html" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Voltar para a loja
    </a>

    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-badge">PG</span>
        <span class="logo-text">PGLM</span>
      </div>

      <h1 class="auth-title">Criar conta grátis</h1>
      <p class="auth-sub">Receba seus gift cards direto no painel.</p>

      <div class="auth-perks">
        <span class="auth-perk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Gratuito</span>
        <span class="auth-perk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Histórico de compras</span>
        <span class="auth-perk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Saldo da loja</span>
      </div>

      <div id="auth-feedback" class="auth-feedback" style="display:none"></div>

      <form class="auth-form" id="registerForm" novalidate>
        <div class="auth-field">
          <label for="reg-name">Nome completo</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
            <input type="text" id="reg-name" name="name" placeholder="João Silva" autocomplete="name" required minlength="3" />
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-phone">Telefone</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.63 19.79 19.79 0 01.01 4 2 2 0 012 1.84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <input type="tel" id="reg-phone" name="phone" placeholder="(11) 99999-9999" autocomplete="tel" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-password">Senha</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="password" id="reg-password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6" />
            <button type="button" class="toggle-pass" data-target="reg-password" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-confirm">Confirmar senha</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="password" id="reg-confirm" name="confirm" placeholder="Repita a senha" autocomplete="new-password" required minlength="6" />
            <button type="button" class="toggle-pass" data-target="reg-confirm" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-terms">
          <label class="auth-check-label">
            <input type="checkbox" id="reg-terms" required />
            <span>Li e aceito os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a></span>
          </label>
        </div>

        <button type="submit" class="auth-btn" id="registerBtn">
          <span class="auth-btn-text">Criar minha conta</span>
          <span class="auth-spinner" style="display:none"></span>
        </button>
      </form>

      <p class="auth-switch">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>
    </div>

  </div>

  <script src="env.js"></script>
  <script src="auth.js"></script>
</body>
</html>
