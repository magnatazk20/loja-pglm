<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — PGLM Gift Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-bg" aria-hidden="true">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>

  <div class="auth-wrap">

    <a href="index.html" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Voltar para a loja
    </a>

    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-badge">PG</span>
        <span class="logo-text">PGLM</span>
      </div>

      <h1 class="auth-title">Criar conta grátis</h1>
      <p class="auth-sub">Receba seus gift cards direto no painel.</p>

      <div class="auth-perks">
        <span class="auth-perk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Gratuito</span>
        <span class="auth-perk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Histórico de compras</span>
        <span class="auth-perk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Saldo da loja</span>
      </div>

      <div id="auth-feedback" class="auth-feedback" style="display:none"></div>

      <form class="auth-form" id="registerForm" novalidate>
        <div class="auth-field">
          <label for="reg-name">Nome completo</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
            <input type="text" id="reg-name" name="name" placeholder="João Silva" autocomplete="name" required minlength="3" />
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-phone">Telefone</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.63 19.79 19.79 0 01.01 4 2 2 0 012 1.84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <input type="tel" id="reg-phone" name="phone" placeholder="(11) 99999-9999" autocomplete="tel" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-password">Senha</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="password" id="reg-password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6" />
            <button type="button" class="toggle-pass" data-target="reg-password" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-field">
          <label for="reg-confirm">Confirmar senha</label>
          <div class="auth-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="password" id="reg-confirm" name="confirm" placeholder="Repita a senha" autocomplete="new-password" required minlength="6" />
            <button type="button" class="toggle-pass" data-target="reg-confirm" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-terms">
          <label class="auth-check-label">
            <input type="checkbox" id="reg-terms" required />
            <span>Li e aceito os <a href="termos.html" target="_blank">Termos de Compra</a></span>
          </label>
        </div>

        <!-- ── CAPTCHA ──────────────────────────────────────────── -->
        <div class="auth-field" id="captcha-block">
          <label for="captcha-input" style="justify-content:space-between;display:flex;align-items:center;">
            <span>Verificação de segurança</span>
            <button type="button" id="captcha-refresh" title="Novo desafio"
              style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;display:flex;align-items:center;gap:4px;font-size:0.75rem;font-weight:600;transition:color .15s;"
              onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--text3)'">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Novo
            </button>
          </label>
          <div style="display:flex;gap:10px;align-items:center;">
            <div style="position:relative;flex-shrink:0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);">
              <canvas id="captcha-canvas" width="160" height="56" style="display:block;"></canvas>
            </div>
            <div class="auth-input-wrap" style="flex:1;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <input type="text" id="captcha-input" name="captcha" placeholder="Digite o resultado" autocomplete="off"
                inputmode="numeric" maxlength="4"
                style="padding-right:12px;" />
            </div>
          </div>
          <p id="captcha-hint" style="font-size:0.76rem;color:var(--text3);margin-top:2px;">Resolva a conta acima e digite o resultado.</p>
        </div>
        <!-- ── /CAPTCHA ─────────────────────────────────────────── -->

        <button type="submit" class="auth-btn" id="registerBtn">
          <span class="auth-btn-text">Criar minha conta</span>
          <span class="auth-spinner" style="display:none"></span>
        </button>
      </form>

      <p class="auth-switch">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>
    </div>

  </div>

  <script src="env.js"></script>

  <!-- ── CAPTCHA engine (inline, não depende de cache externo) ── -->
  <script>
  (function () {
    'use strict';

    /* ── salt interno (mistura com a resposta para gerar token) ── */
    const SALT = 'pglm_cap_2x9z';

    /* ── estado ─────────────────────────────────────────────────── */
    let _answer = 0;
    let _token  = '';
    let _used   = false;      /* evita reutilizar o mesmo token     */

    /* ── geração do token ────────────────────────────────────────
       token = base64( answer_xor_salt + ":" + timestamp )
       Sem o SALT e o timestamp, não dá pra forjar.
    ─────────────────────────────────────────────────────────────── */
    function makeToken(answer) {
      const ts  = Date.now();
      const raw = (answer ^ ts & 0xFFFF) + ':' + ts + ':' + SALT;
      return btoa(raw);
    }

    function verifyToken(token, userAnswer) {
      try {
        const raw   = atob(token);
        const parts = raw.split(':');
        if (parts.length < 3) return false;
        const ts      = parseInt(parts[1], 10);
        const saltOk  = parts.slice(2).join(':') === SALT;
        const ageOk   = (Date.now() - ts) < 10 * 60 * 1000;   /* 10 min */
        const xorBack = parseInt(parts[0], 10) ^ (ts & 0xFFFF);
        return saltOk && ageOk && (xorBack === parseInt(userAnswer, 10));
      } catch { return false; }
    }

    /* ── geração do desafio ──────────────────────────────────────
       Operações: soma e subtração (resultado sempre ≥ 0, ≤ 20).
       Nunca usa multiplicação/divisão pra não assustar.
    ─────────────────────────────────────────────────────────────── */
    function newChallenge() {
      const ops = ['+', '-'];
      const op  = ops[Math.floor(Math.random() * ops.length)];
      let a, b;
      if (op === '+') {
        a = Math.floor(Math.random() * 10) + 1;   /* 1–10 */
        b = Math.floor(Math.random() * 10) + 1;
      } else {
        a = Math.floor(Math.random() * 10) + 10;  /* 10–19 */
        b = Math.floor(Math.random() * a);         /* 0..(a-1) */
      }
      return { a, b, op, answer: op === '+' ? a + b : a - b };
    }

    /* ── renderização no canvas ──────────────────────────────────
       Usa ruído (linhas, pontos, curvas) + texto ligeiramente rotacionado
       dificultando OCR mas mantendo leitura humana fácil.
    ─────────────────────────────────────────────────────────────── */
    function drawCaptcha(canvas, challenge) {
      const ctx = canvas.getContext('2d');
      const W   = canvas.width;
      const H   = canvas.height;

      /* fundo */
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(0, 0, W, H);

      /* linhas de ruído */
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(rnd(0, W), rnd(0, H));
        ctx.bezierCurveTo(rnd(0,W), rnd(0,H), rnd(0,W), rnd(0,H), rnd(0,W), rnd(0,H));
        ctx.strokeStyle = 'rgba(' + rndInt(80,160) + ',' + rndInt(80,160) + ',' + rndInt(140,220) + ',0.35)';
        ctx.lineWidth   = rnd(0.8, 1.6);
        ctx.stroke();
      }

      /* pontos de ruído */
      for (let i = 0; i < 40; i++) {
        ctx.beginPath();
        ctx.arc(rnd(0, W), rnd(0, H), rnd(0.8, 2), 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(150,150,200,0.3)';
        ctx.fill();
      }

      /* texto do desafio */
      const text  = challenge.a + ' ' + challenge.op + ' ' + challenge.b + ' = ?';
      const chars = text.split('');
      const startX = 12;
      const baseY  = H / 2 + 8;
      const step   = (W - 24) / chars.length;

      ctx.save();
      chars.forEach((ch, i) => {
        const x     = startX + i * step;
        const angle = (Math.random() - 0.5) * 0.3;
        const dy    = (Math.random() - 0.5) * 5;
        ctx.save();
        ctx.translate(x + step / 2, baseY + dy);
        ctx.rotate(angle);
        ctx.font = 'bold ' + rndInt(20, 24) + 'px Inter, sans-serif';
        ctx.fillStyle = i % 2 === 0
          ? 'rgba(167,167,255,0.95)'
          : 'rgba(200,200,255,0.88)';
        ctx.textAlign  = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ch, 0, 0);
        ctx.restore();
      });
      ctx.restore();
    }

    function rnd(min, max) { return Math.random() * (max - min) + min; }
    function rndInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    /* ── API pública (usada pelo auth.js via window.CAPTCHA) ─── */
    window.CAPTCHA = {
      verify(userInput) {
        if (_used) return false;
        const ok = verifyToken(_token, userInput.trim());
        if (ok) _used = true;
        return ok;
      },
      reset: generate,
      markUsed() { _used = true; }
    };

    /* ── inicialização ───────────────────────────────────────── */
    function generate() {
      const canvas = document.getElementById('captcha-canvas');
      if (!canvas) return;

      _used = false;
      const ch = newChallenge();
      _answer  = ch.answer;
      _token   = makeToken(_answer);

      /* limpa input */
      const inp = document.getElementById('captcha-input');
      if (inp) { inp.value = ''; inp.classList.remove('error'); }

      /* guarda token em sessionStorage (extra de segurança — não ajuda bot) */
      try { sessionStorage.setItem('pglm_cap_tk', _token); } catch {}

      drawCaptcha(canvas, ch);
    }

    /* aguarda DOM pronto */
    function init() {
      generate();
      const refreshBtn = document.getElementById('captcha-refresh');
      if (refreshBtn) refreshBtn.addEventListener('click', generate);

      /* limpa erro ao digitar */
      const inp = document.getElementById('captcha-input');
      if (inp) inp.addEventListener('input', () => inp.classList.remove('error'));
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>

  <script src="auth.js"></script>

  <!-- ── hook CAPTCHA no formulário de cadastro ─────────────── -->
  <script>
  (function () {
    /* aguarda o auth.js registrar o listener e então adiciona o
       nosso interceptador ANTES do submit chegar ao fetch */
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('registerForm');
      if (!form) return;

      /* capturamos o submit na fase de captura (capture=true)
         para rodar ANTES do listener do auth.js */
      form.addEventListener('submit', function (e) {
        const inp   = document.getElementById('captcha-input');
        const hint  = document.getElementById('captcha-hint');
        if (!inp) return;

        const val = inp.value.trim();

        if (!val) {
          e.preventDefault();
          e.stopImmediatePropagation();
          inp.classList.add('error');
          if (hint) { hint.textContent = '⚠ Digite o resultado da conta acima.'; hint.style.color = '#fca5a5'; }
          inp.focus();
          return;
        }

        if (!window.CAPTCHA || !window.CAPTCHA.verify(val)) {
          e.preventDefault();
          e.stopImmediatePropagation();
          inp.classList.add('error');
          if (hint) { hint.textContent = '✕ Resposta incorreta. Um novo desafio foi gerado.'; hint.style.color = '#fca5a5'; }
          /* gera novo desafio */
          if (window.CAPTCHA) window.CAPTCHA.reset();
          inp.focus();
          return;
        }

        /* CAPTCHA ok — deixa o submit prosseguir para o auth.js */
        if (hint) { hint.textContent = '✓ Verificação concluída.'; hint.style.color = '#6ee7b7'; }
      }, true /* capture phase */);
    });
  })();
  </script>
</body>
</html>
